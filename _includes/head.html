<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="robots" content="{{ page.robots | default: site.robots }}">
  <meta name="googlebot" content="{{ page.googlebot | default: site.googlebot }}">
  <meta name="bingbot" content="{{ page.googlebot | default: site.googlebot }}">
  <meta name="noai" content="true">
  <meta name="noimageai" content="true">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arapey:ital@0;1&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <script src="{{ '/assets/slider.js' | relative_url }}" defer></script>
</head>
